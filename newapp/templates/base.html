{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dcomforters' Kitchen</title>
    <meta name="description" content="Family-owned Nigerian restaurant in Destin, Florida — intercontinental dishes with a modern twist." />
    <meta name="author" content="Dcomforters' Kitchen" />

    <link rel="shortcut icon" type="image/png" href="{% static 'img/favic.png' %}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    {% include 'partials/_header.html' %}

    <main>{% block content %}{% endblock %}</main>

    {% include 'partials/_footer.html' %}

    <!-- Scripts at bottom so DOM is ready -->
    <script src="{% static 'js/scroll-effects.js' %}"></script>
    <script src="{% static 'js/nav-toggle.js' %}"></script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
