name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        run: |
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"

  build-and-push:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/dcomforter/dcomforters-kitchen:${{ needs.tag.outputs.version }}

  deploy:
    needs: [tag, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: Dcomforter/dcomforters-kitchen-config
          token: ${{ secrets.CONFIG_REPO_PAT }}

      - name: Bump image tag
        run: |
          sed -i "s|image: ghcr.io/dcomforter/dcomforters-kitchen:.*|image: ghcr.io/dcomforter/dcomforters-kitchen:${{ needs.tag.outputs.version }}|" \
            apps/dcomforters/overlays/production/deployment-patch.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/dcomforters/overlays/production/deployment-patch.yaml
          git commit -m "Bump production image to ${{ needs.tag.outputs.version }}" || exit 0
          git push
